; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32p4]
platform =  https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip#54.03.21
board = esp32-p4-evboard
upload_speed = 1500000
monitor_speed = 115200
; upload_protocol = espota
; upload_port = tab5.local
;build_type = debug
; upload_port = /dev/cu.usbmodem1101 
framework = arduino
board_build.mcu = esp32p4
board_build.flash_mode = qio
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE=1
    -include src/lv_conf.h
    -I src

    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ;-DLV_CONF_PATH="src/lv_conf.h"

    

lib_deps =
    https://github.com/M5Stack/M5Unified.git
    https://github.com/M5Stack/M5GFX.git 
    lvgl/lvgl@8.3.11
    robtillaart/INA226@^0.6.4
    gilmaimon/ArduinoWebsockets@^0.5.4
    ;avinabmalla/ESP32_BleSerial@^2.0.1


